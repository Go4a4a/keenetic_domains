name: Update geosite domain lists

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build domain lists
        run: python build.py

      - name: Commit updated lists
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add output/*.txt

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update geosite domain lists"
            git push
          fi